<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Himalayan Brew – Premium Nepali Teas</title>

<meta name="description" content="Premium organic Nepali teas from Ilam.">
<meta name="keywords" content="Nepal tea, Ilam tea, organic tea">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Cormorant+Garamond&family=Cinzel&display=swap" rel="stylesheet">

<style>
:root{
--forest:#1a2e1a;
--gold:#d4a843;
--cream:#f5f0e8;
--mist:#8aa88a;
--snow:#faf8f4;
}

body{
margin:0;
font-family:'Cormorant Garamond',serif;
background:var(--snow);
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
background:rgba(26,46,26,0.95);
color:white;
display:flex;
justify-content:space-between;
padding:1rem 2rem;
z-index:1000;
}

.nav-links{
display:flex;
gap:1.5rem;
}

.nav-links a{
cursor:pointer;
color:white;
text-decoration:none;
}

.menu-btn{
display:none;
cursor:pointer;
}

/* HERO */
.hero{
height:100vh;
background:linear-gradient(#1a2e1a,#0d1a0d);
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
padding:2rem;
}

/* PRODUCTS */
.products{
padding:5rem 2rem;
}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:1rem;
}

.product-card{
background:var(--forest);
color:white;
padding:2rem;
cursor:pointer;
transition:0.3s;
}

.product-card:hover{
transform:scale(1.05);
}

/* PAGE SYSTEM */
.page{display:none;}
.page.active{display:block;}

/* PRODUCT PAGE */
.product-page{
padding-top:80px;
padding:2rem;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
right:20px;
background:var(--forest);
color:white;
padding:1rem;
transform:translateX(200%);
transition:0.3s;
}
.toast.show{transform:translateX(0);}

/* MOBILE */
@media(max-width:768px){
.nav-links{
display:none;
flex-direction:column;
background:var(--forest);
position:absolute;
top:60px;
right:20px;
padding:1rem;
}
.nav-links.show{display:flex;}
.menu-btn{display:block;}
}
</style>
</head>

<body>

<div class="toast" id="toast">Added to cart</div>

<!-- NAV -->
<nav>
<div>HIMALAYAN BREW</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="nav-links">
<a onclick="goHome()">Home</a>
<a onclick="scrollToSection('teas')">Teas</a>
<a onclick="scrollToSection('story')">Story</a>
</div>
</nav>

<!-- HOME PAGE -->
<div id="home" class="page active">

<section class="hero">
<div>
<h1>Taste the Himalayas</h1>
<p>Premium organic tea from Nepal</p>
</div>
</section>

<section class="products" id="teas">
<h2>Our Teas</h2>

<div class="products-grid">
<div class="product-card" onclick="openProduct('green')">Green Tea</div>
<div class="product-card" onclick="openProduct('black')">Black Tea</div>
<div class="product-card" onclick="openProduct('white')">White Tea</div>
</div>

</section>

</div>

<!-- PRODUCT PAGE -->
<div id="product-green" class="page product-page">
<h2>Green Tea</h2>
<p>Fresh Himalayan green tea.</p>
<button onclick="addToCart()">Add to Cart</button>
<button onclick="goHome()">Back</button>
</div>

<div id="product-black" class="page product-page">
<h2>Black Tea</h2>
<p>Rich Ilam black tea.</p>
<button onclick="addToCart()">Add to Cart</button>
<button onclick="goHome()">Back</button>
</div>

<div id="product-white" class="page product-page">
<h2>White Tea</h2>
<p>Premium white tea.</p>
<button onclick="addToCart()">Add to Cart</button>
<button onclick="goHome()">Back</button>
</div>

<script>

/* NAVIGATION */
function goHome(){
hideAllPages();
document.getElementById('home').classList.add('active');
window.scrollTo({top:0,behavior:'smooth'});
}

function openProduct(name){
hideAllPages();
document.getElementById('product-'+name).classList.add('active');
}

function hideAllPages(){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
}

/* SCROLL */
function scrollToSection(id){
goHome();
setTimeout(()=>{
document.getElementById(id).scrollIntoView({behavior:'smooth'});
},100);
}

/* MOBILE MENU */
function toggleMenu(){
document.querySelector('.nav-links').classList.toggle('show');
}

/* CART */
let cartCount=0;

function addToCart(){
cartCount++;
showToast();
}

/* TOAST */
function showToast(){
const toast=document.getElementById('toast');
toast.classList.add('show');
setTimeout(()=>toast.classList.remove('show'),2000);
}

/* SCROLL REVEAL */
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add('visible');
}
});
});

document.querySelectorAll('.product-card').forEach(el=>{
observer.observe(el);
});

</script>

</body>
</html>
